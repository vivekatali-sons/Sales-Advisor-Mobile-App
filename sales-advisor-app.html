const fmtF=n=>n.toLocaleString();

// Bar Chart
const BarChart=({data,dataKey,labelKey,width=320,height=130,color=T.primary,highlightIndex=-1,showTarget,targetKey})=>{
  const max=Math.max(...data.map(d=>Math.max(d[dataKey],showTarget?d[targetKey]||0:0)))*1.15;
  const barW=showTarget?(width/data.length-12)/2:width/data.length-12;
  const gap=showTarget?2:0;
  return(
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{overflow:"visible"}}>
      {data.map((d,i)=>{
        const x=i*(width/data.length)+6;
        const h1=d[dataKey]/max*(height-24);
        const tgtH=showTarget&&d[targetKey]?d[targetKey]/max*(height-24):0;
        return(
          <g key={i}>
            {showTarget&&<rect x={x} y={height-24-tgtH} width={barW} height={tgtH} rx={4} fill={T.primary+"20"}/>}
            <rect x={showTarget?x+barW+gap:x} y={height-24-h1} width={barW} height={h1} rx={4}
              fill={highlightIndex>=0?(i===highlightIndex?color:color+"30"):color} />
            <text x={x+(showTarget?barW+gap/2:barW/2)} y={height-6} textAnchor="middle"
              fontSize="10" fill={T.tt} fontFamily="DM Sans">{d[labelKey]}</text>
          </g>
        );
      })}
    </svg>
  );
};

// Area/Line Chart
const AreaChartSVG=({data,dataKey,labelKey,width=320,height=160,color=T.primary,showDots=true,fillOpacity=.1,showLabels=true,prevData,showPrev=false})=>{
  const allVals=[...data.map(d=>d[dataKey]),...(showPrev&&prevData?prevData:[])];
  const max=Math.max(...allVals)*1.2;
  const min=Math.min(...allVals)*.8;
  const range=max-min||1;
  const padX=10,padY=10;
  const cW=width-padX*2,cH=height-(showLabels?30:10)-padY;

  const toPoint=(val,i,len)=>{
    const x=padX+(i/(len-1))*cW;
    const y=padY+cH-(val-min)/range*cH;
    return{x,y};
  };

  const pts=data.map((d,i)=>toPoint(d[dataKey],i,data.length));
  const linePath=pts.map((p,i)=>((i===0?"M":"L")+p.x+","+p.y)).join(" ");
  const areaPath=linePath+" L"+pts[pts.length-1].x+","+(padY+cH)+" L"+pts[0].x+","+(padY+cH)+" Z";

  let prevPts=[],prevLine="";
  if(showPrev&&prevData){
    prevPts=prevData.map((v,i)=>toPoint(v,i,prevData.length));
    prevLine=prevPts.map((p,i)=>((i===0?"M":"L")+p.x+","+p.y)).join(" ");
  }

  // Grid lines
  const gridLines=[];
  for(let i=0;i<4;i++){
    const y=padY+i*(cH/3);
    const val=max-(i*(range/3))+min*(i/3);
    gridLines.push({y,label:fmt(Math.round(max-i*range/3+min))});
  }

  return(
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`}>
      {gridLines.map((g,i)=>(
        <g key={i}>
          <line x1={padX} y1={g.y} x2={width-padX} y2={g.y} stroke={T.border} strokeDasharray="4,4"/>
          <text x={padX-2} y={g.y-4} fontSize="9" fill={T.tt} fontFamily="DM Sans" textAnchor="start">{g.label}</text>
        </g>
      ))}
      <path d={areaPath} fill={color} opacity={fillOpacity}/>
      <path d={linePath} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {showPrev&&prevData&&<path d={prevLine} fill="none" stroke={T.tt} strokeWidth="1.5" strokeDasharray="4,4" strokeLinecap="round"/>}
      {showDots&&pts.map((p,i)=>(
        <circle key={i} cx={p.x} cy={p.y} r={4} fill={color} stroke="#fff" strokeWidth="2"/>
      ))}
      {showLabels&&data.map((d,i)=>{
        const p=toPoint(d[dataKey],i,data.length);
        return <text key={i} x={p.x} y={height-6} textAnchor="middle" fontSize="10" fill={T.tt} fontFamily="DM Sans">{d[labelKey]}</text>;
      })}
    </svg>
  );
};

// Mini sparkline
const Sparkline=({data,dataKey,width=120,height=30,color=T.primary})=>{
  const max=Math.max(...data.map(d=>d[dataKey]));
  const min=Math.min(...data.map(d=>d[dataKey]));
  const range=max-min||1;
  const pts=data.map((d,i)=>{
    const x=(i/(data.length-1))*width;
    const y=height-(d[dataKey]-min)/range*(height-4)-2;
    return `${x},${y}`;
  });
  const line="M"+pts.join(" L");
  const area=line+` L${width},${height} L0,${height} Z`;
  return(
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`}>
      <path d={area} fill={color} opacity=".12"/><path d={line} fill="none" stroke={color} strokeWidth="1.5"/>
    </svg>
  );
};

// Donut Chart
const DonutChart=({data,size=140,thickness=25})=>{
  const r=(size-thickness)/2;
  const cx=size/2,cy=size/2;
  const total=data.reduce((s,d)=>s+d.value,0);
  let cumAngle=-90;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {data.map((d,i)=>{
        const angle=(d.value/total)*360;
        const startAngle=cumAngle;
        cumAngle+=angle;
        const endAngle=cumAngle;
        const start={x:cx+r*Math.cos(startAngle*Math.PI/180),y:cy+r*Math.sin(startAngle*Math.PI/180)};
        const end={x:cx+r*Math.cos(endAngle*Math.PI/180),y:cy+r*Math.sin(endAngle*Math.PI/180)};
        const large=angle>180?1:0;
        const path=`M${start.x},${start.y} A${r},${r} 0 ${large} 1 ${end.x},${end.y}`;
        return <path key={i} d={path} fill="none" stroke={d.color} strokeWidth={thickness} strokeLinecap="butt"/>;
      })}
    </svg>
  );
};

const AnimNum=({value,prefix="",dur=800})=>{
  const[d,setD]=useState(0);const ref=useRef();
  useEffect(()=>{const t0=Date.now();const go=()=>{const p=Math.min((Date.now()-t0)/dur,1);setD(Math.round((1-Math.pow(1-p,3))*value));if(p<1)ref.current=requestAnimationFrame(go)};ref.current=requestAnimationFrame(go);return()=>cancelAnimationFrame(ref.current)},[value]);
  return <span>{prefix}{fmtF(d)}</span>;
};

const CircProg=({pct:p,size=120,sw=8,color=T.primary})=>{
  const r=(size-sw)/2,c=2*Math.PI*r,off=c-(p/100)*c;
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth={sw}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
        strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
        style={{transition:"stroke-dashoffset 1s ease-out"}}/>
    </svg>
  );
};

const Sim=({nav})=>{
  const[sel,setSel]=useState({});
  const toggle=id=>setSel(p=>({...p,[id]:!p[id]}));
  const picked=leads.filter(l=>sel[l.id]);
  const addVal=picked.reduce((s,l)=>s+l.value,0);
  const addComm=picked.reduce((s,l)=>s+l.comm,0);
  const newAch=advisor.achieved+addVal;
  const newP=pct(newAch,advisor.monthlyTarget);
  const curP=pct(advisor.achieved,advisor.monthlyTarget);
  const curM=getMult(curP),newM=getMult(newP);
  const newInc=Math.round(advisor.base*newM+advisor.bonuses+addComm);

  const cnt=picked.length;

  return(
    <div>
      <div style={S.hdr}><button onClick={()=>nav("dash")} style={{background:"none",border:"none",cursor:"pointer"}}><I name="back" size={22}/></button><h2 style={{fontSize:17,fontWeight:700}}>Incentive Simulator</h2><div style={{width:30}}/></div>

        <div style={{...S.card,background:cnt?"linear-gradient(135deg,"+T.primary+",#245E4A)":T.card,color:cnt?"#fff":T.text,padding:24,transition:"all .5s",border:cnt?"none":"1px solid "+T.border}}>
          {cnt?(

                <div><p style={{fontSize:14,fontWeight:700}}>+AED {fmtF(gain)} additional incentive</p><p style={{fontSize:11,opacity:.6}}>{newM>curM?"Slab upgrade: "+curM+"x → "+newM+"x":"Same slab"}</p></div>
              </div>
            </div>
          ):(
            <div style={{textAlign:"center",padding:"12px 0"}}><I name="sim" size={36} color={T.tt}/><p style={{fontSize:15,fontWeight:600,marginTop:12,marginBottom:4}}>Select leads to simulate</p><p style={{fontSize:12,color:T.ts}}>Toggle leads below to see the impact on your incentive</p></div>

};

/* ═══════════════════════════════════════════════════════════════
   APP ROOT
   ═══════════════════════════════════════════════════════════════ */
function App(){
  const[scr,setScr]=useState("login");
  const[tab,setTab]=useState("dash");

  const nav=s=>{setScr(s);setTab(s==="dash"?"dash":s==="perf"||s==="detail"?"perf":s==="leads"?"leads":s==="sim"?"sim":s==="inc"||s==="ytd"?"inc":"dash");window.scrollTo({top:0,behavior:"smooth"})};

  if(scr==="login")return <Login onLogin={()=>nav("dash")}/>;

  const screens={dash:<Dashboard nav={nav}/>,perf:<Perf nav={nav}/>,inc:<Inc nav={nav}/>,ytd:<YTD nav={nav}/>,leads:<Leads nav={nav}/>,sim:<Sim nav={nav}/>,detail:<Detail nav={nav}/>};

  const tabs=[{k:"dash",i:"chart",l:"Home"},{k:"perf",i:"target",l:"Performance"},{k:"inc",i:"wallet",l:"Incentive"},{k:"leads",i:"leads",l:"Leads"},{k:"sim",i:"sim",l:"Simulator"}];

  return(
    <div style={S.app}>
      <div style={{animation:"fadeIn .3s ease"}}>{screens[scr]}</div>
      <div style={S.nav}>
        {tabs.map(t=>(
          <div key={t.k} onClick={()=>nav(t.k)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"6px 14px",borderRadius:16,cursor:"pointer",background:tab===t.k?T.primary+"10":"transparent"}}>
            <I name={t.i} size={20} color={tab===t.k?T.primary:T.tt}/>
            <span style={{fontSize:10,fontWeight:tab===t.k?700:500,color:tab===t.k?T.primary:T.tt}}>{t.l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
